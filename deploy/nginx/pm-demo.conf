# ============================================================
# SAP PM Demo - nginx location block
# ============================================================
#
# This file is a SNIPPET to be added to your existing nginx server block
# for the AEM Field Guide (the one listening on port 9080).
#
# HOW TO INSTALL:
#
#   1. Find your existing nginx config (likely at one of these paths):
#      - /etc/nginx/sites-available/default
#      - /etc/nginx/sites-available/aem-fieldguide
#      - /etc/nginx/conf.d/aem-fieldguide.conf
#
#   2. Find the `server { ... }` block that listens on port 9080.
#
#   3. Inside that server block, ADD the location blocks below
#      (don't replace the whole server block — just add these locations).
#
#   4. Test the config:
#         sudo nginx -t
#
#   5. Reload nginx:
#         sudo systemctl reload nginx
#
#   6. Verify:
#         curl -I http://localhost:9080/sap-pm-demo/dashboard
#
# ============================================================

# Serve the demo dashboard at /sap-pm-demo/dashboard
location = /sap-pm-demo {
    return 302 /sap-pm-demo/dashboard;
}

location = /sap-pm-demo/ {
    return 302 /sap-pm-demo/dashboard;
}

# Clean URL: /sap-pm-demo/dashboard → dashboard.html
location = /sap-pm-demo/dashboard {
    alias /home/ubuntu/sap/ai/pm-demo/web/dashboard.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header X-Content-Type-Options "nosniff";
}

# Clean URL: /sap-pm-demo/architecture → architecture.html
location = /sap-pm-demo/architecture {
    alias /home/ubuntu/sap/ai/pm-demo/web/architecture.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
}

# Clean URL: /sap-pm-demo/technician → technician.html
location = /sap-pm-demo/technician {
    alias /home/ubuntu/sap/ai/pm-demo/web/technician.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
}

# Static assets (CSS, JS, images) - cache aggressively
location /sap-pm-demo/static/ {
    alias /home/ubuntu/sap/ai/pm-demo/web/static/;
    expires 1d;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff";
}

# Docs and other web content
location /sap-pm-demo/docs/ {
    alias /home/ubuntu/sap/ai/pm-demo/web/docs/;
    add_header Cache-Control "no-cache";
}

# Specs (AsyncAPI / OpenAPI JSON files)
location /sap-pm-demo/specs/ {
    alias /home/ubuntu/sap/ai/pm-demo/specs/;
    add_header Cache-Control "no-cache";
    add_header Content-Type "application/json" always;
}

# ============================================================
# For CloudFront integration (when ready):
# ============================================================
# Add a new behavior to your existing CloudFront distribution:
#   - Path pattern: /sap-pm-demo/*
#   - Origin: same EC2 origin you already use for /fieldguide
#   - Cache policy: CachingDisabled (HTML is dynamic)
#   - Origin request policy: AllViewer
#
# The result: https://your-cloudfront.cloudfront.net/sap-pm-demo/dashboard
# will serve the same content as the EC2 HTTP URL.
# ============================================================
